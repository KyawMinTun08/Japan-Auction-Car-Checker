name: Build JACC Android APK

on:
  push:
    branches: [android-apk]
    paths:
      - 'android-app/**'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches: [main]
    paths:
      - 'android-app/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'
      - name: Build signed release APK
        run: gradle assembleRelease --stacktrace
      - name: Rename APK
        run: cp app/build/outputs/apk/release/app-release.apk JACC-Android-v1.0.0.apk
      - uses: actions/upload-artifact@v4
        with:
          name: JACC-Android-v1.0.0
          path: android-app/JACC-Android-v1.0.0.apk
          retention-days: 90
