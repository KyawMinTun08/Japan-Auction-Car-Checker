name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - feature/android-apkpure-wrapper
    paths:
      - "android-app/**"
      - ".github/workflows/build-android-apk.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Restore release keystore
        if: ${{ secrets.JACC_KEYSTORE_BASE64 != '' }}
        working-directory: android-app
        env:
          KEYSTORE_BASE64: ${{ secrets.JACC_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.JACC_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.JACC_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.JACC_KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > jacc-release.jks
          cat > keystore.properties <<EOF
          storeFile=../jacc-release.jks
          storePassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Build release APK
        working-directory: android-app
        run: gradle assembleRelease --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: jacc-android-apk
          path: android-app/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
