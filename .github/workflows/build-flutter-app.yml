name: Build JACC Flutter App

on:
  push:
    branches: [main, agent/jacc-flutter-clean, agent/build-jacc-apk]
    paths:
      - 'flutter_app/**'
      - '.github/workflows/build-flutter-app.yml'
  pull_request:
    branches: [main]
    paths:
      - 'flutter_app/**'
      - '.github/workflows/build-flutter-app.yml'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Generate Android project
        run: flutter create . --platforms=android --org=com.jacc.app
      - name: Install icon generator dependency
        run: python3 -m pip install pillow
      - name: Configure JACC Android app
        run: |
          python3 - <<'PY'
          from pathlib import Path
          from PIL import Image, ImageDraw

          manifest = Path('android/app/src/main/AndroidManifest.xml')
          s = manifest.read_text()
          for permission in [
              '<uses-permission android:name="android.permission.INTERNET" />',
              '<uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />',
          ]:
              if permission not in s:
                  s = s.replace('<manifest xmlns:android="http://schemas.android.com/apk/res/android">',
                                '<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    ' + permission)
          s = s.replace('android:label="jacc_app"', 'android:label="JACC"')
          manifest.write_text(s)

          colors = Path('android/app/src/main/res/values/colors.xml')
          colors.write_text('<?xml version="1.0" encoding="utf-8"?>\n<resources><color name="jacc_navy">#050B16</color></resources>\n')

          launch = Path('android/app/src/main/res/drawable/launch_background.xml')
          launch.write_text('''<?xml version="1.0" encoding="utf-8"?>
          <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
              <item android:drawable="@color/jacc_navy" />
              <item><bitmap android:gravity="center" android:src="@mipmap/ic_launcher" /></item>
          </layer-list>
          ''')

          sizes = {'mipmap-mdpi':48,'mipmap-hdpi':72,'mipmap-xhdpi':96,'mipmap-xxhdpi':144,'mipmap-xxxhdpi':192}
          for folder, size in sizes.items():
              out = Path('android/app/src/main/res') / folder
              out.mkdir(parents=True, exist_ok=True)
              img = Image.new('RGBA', (size, size), '#050B16')
              d = ImageDraw.Draw(img)
              margin = max(3, size // 12)
              d.rounded_rectangle((margin, margin, size-margin, size-margin), radius=size//5, fill='#0B1220', outline='#C8102E', width=max(2,size//24))
              d.line((size*.20,size*.56,size*.34,size*.38,size*.68,size*.38,size*.82,size*.56), fill='#E5E7EB', width=max(2,size//18))
              d.line((size*.18,size*.58,size*.82,size*.58), fill='#C8102E', width=max(2,size//16))
              d.ellipse((size*.25,size*.55,size*.38,size*.68), fill='#E5E7EB')
              d.ellipse((size*.62,size*.55,size*.75,size*.68), fill='#E5E7EB')
              img.save(out / 'ic_launcher.png')
              img.save(out / 'ic_launcher_round.png')
          PY
      - run: flutter pub get
      - name: Analyze Flutter source
        run: flutter analyze || true
      - name: Build unsigned release APK and AAB
        run: |
          flutter build apk --release
          flutter build appbundle --release
      - name: Sign APK with Android v1 v2 v3 signatures
        run: |
          set -e
          mkdir -p release
          keytool -genkeypair -v \
            -keystore jacc-install-test.jks \
            -storepass JaccTest2026 \
            -keypass JaccTest2026 \
            -alias jacc \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=JACC, OU=JACC, O=JACC, L=Yangon, ST=Yangon, C=MM"
          APKSIGNER=$(find "${ANDROID_SDK_ROOT:-$ANDROID_HOME}/build-tools" -type f -name apksigner | sort -V | tail -1)
          ZIPALIGN=$(find "${ANDROID_SDK_ROOT:-$ANDROID_HOME}/build-tools" -type f -name zipalign | sort -V | tail -1)
          test -x "$APKSIGNER"
          test -x "$ZIPALIGN"
          "$ZIPALIGN" -f -p 4 build/app/outputs/flutter-apk/app-release.apk release/JACC-v1.0.0-aligned.apk
          "$APKSIGNER" sign \
            --ks jacc-install-test.jks \
            --ks-key-alias jacc \
            --ks-pass pass:JaccTest2026 \
            --key-pass pass:JaccTest2026 \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out release/JACC-v1.0.0-install-test.apk \
            release/JACC-v1.0.0-aligned.apk
          "$APKSIGNER" verify --verbose --print-certs release/JACC-v1.0.0-install-test.apk
          rm release/JACC-v1.0.0-aligned.apk
      - name: Prepare release files
        run: |
          cp build/app/outputs/bundle/release/app-release.aab release/JACC-v1.0.0.aab
          sha256sum release/JACC-v1.0.0-install-test.apk > release/JACC-v1.0.0-install-test-sha256.txt
      - uses: actions/upload-artifact@v4
        with:
          name: JACC-v1.0.0-install-test
          path: |
            flutter_app/release/JACC-v1.0.0-install-test.apk
            flutter_app/release/JACC-v1.0.0-install-test-sha256.txt
          retention-days: 90
