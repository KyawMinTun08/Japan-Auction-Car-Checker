name: Build JACC Flutter App

on:
  push:
    branches: [main, agent/jacc-flutter-clean, agent/build-jacc-apk]
    paths:
      - 'flutter_app/**'
      - '.github/workflows/build-flutter-app.yml'
  pull_request:
    branches: [main]
    paths:
      - 'flutter_app/**'
      - '.github/workflows/build-flutter-app.yml'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Generate Android project
        run: flutter create . --platforms=android --org=com.jacc.app
      - name: Install logo renderer
        run: python3 -m pip install pillow cairosvg
      - name: Configure JACC Android app and approved logo
        run: |
          python3 - <<'PY'
          from pathlib import Path
          from PIL import Image
          import cairosvg

          manifest = Path('android/app/src/main/AndroidManifest.xml')
          s = manifest.read_text()
          for permission in [
              '<uses-permission android:name="android.permission.INTERNET" />',
              '<uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />',
          ]:
              if permission not in s:
                  s = s.replace('<manifest xmlns:android="http://schemas.android.com/apk/res/android">',
                                '<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    ' + permission)
          s = s.replace('android:label="jacc_app"', 'android:label="JACC"')
          manifest.write_text(s)

          colors = Path('android/app/src/main/res/values/colors.xml')
          colors.write_text('<?xml version="1.0" encoding="utf-8"?>\n<resources><color name="jacc_navy">#050B16</color></resources>\n')

          logo_svg = Path('assets/jacc_logo.svg')
          logo_png = Path('assets/jacc_logo_1024.png')
          cairosvg.svg2png(url=str(logo_svg), write_to=str(logo_png), output_width=1024, output_height=1024)
          base = Image.open(logo_png).convert('RGBA')

          sizes = {'mipmap-mdpi':48,'mipmap-hdpi':72,'mipmap-xhdpi':96,'mipmap-xxhdpi':144,'mipmap-xxxhdpi':192}
          for folder, size in sizes.items():
              out = Path('android/app/src/main/res') / folder
              out.mkdir(parents=True, exist_ok=True)
              icon = base.resize((size, size), Image.Resampling.LANCZOS)
              icon.save(out / 'ic_launcher.png')
              icon.save(out / 'ic_launcher_round.png')

          drawable = Path('android/app/src/main/res/drawable')
          drawable.mkdir(parents=True, exist_ok=True)
          splash_logo = base.resize((420, 420), Image.Resampling.LANCZOS)
          splash_logo.save(drawable / 'jacc_splash_logo.png')

          launch = drawable / 'launch_background.xml'
          launch.write_text('''<?xml version="1.0" encoding="utf-8"?>
          <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
              <item android:drawable="@color/jacc_navy" />
              <item>
                  <bitmap android:gravity="center" android:src="@drawable/jacc_splash_logo" />
              </item>
          </layer-list>
          ''')
          PY
      - run: flutter pub get
      - name: Analyze Flutter source
        run: flutter analyze || true
      - name: Build unsigned release APK and AAB
        run: |
          flutter build apk --release
          flutter build appbundle --release
      - name: Restore permanent signing key
        env:
          JACC_KEYSTORE_BASE64: ${{ secrets.JACC_KEYSTORE_BASE64 }}
        run: |
          set -e
          test -n "$JACC_KEYSTORE_BASE64"
          printf '%s' "$JACC_KEYSTORE_BASE64" | base64 --decode > jacc-release-key.jks
          test -s jacc-release-key.jks
      - name: Sign release APK with permanent key
        env:
          JACC_KEYSTORE_PASSWORD: ${{ secrets.JACC_KEYSTORE_PASSWORD }}
          JACC_KEY_PASSWORD: ${{ secrets.JACC_KEY_PASSWORD }}
          JACC_KEY_ALIAS: ${{ secrets.JACC_KEY_ALIAS }}
        run: |
          set -e
          test -n "$JACC_KEYSTORE_PASSWORD"
          test -n "$JACC_KEY_PASSWORD"
          test -n "$JACC_KEY_ALIAS"
          mkdir -p release
          APKSIGNER=$(find "${ANDROID_SDK_ROOT:-$ANDROID_HOME}/build-tools" -type f -name apksigner | sort -V | tail -1)
          ZIPALIGN=$(find "${ANDROID_SDK_ROOT:-$ANDROID_HOME}/build-tools" -type f -name zipalign | sort -V | tail -1)
          test -x "$APKSIGNER"
          test -x "$ZIPALIGN"
          "$ZIPALIGN" -f -p 4 build/app/outputs/flutter-apk/app-release.apk release/JACC-v1.0.0-aligned.apk
          "$APKSIGNER" sign \
            --ks jacc-release-key.jks \
            --ks-key-alias "$JACC_KEY_ALIAS" \
            --ks-pass env:JACC_KEYSTORE_PASSWORD \
            --key-pass env:JACC_KEY_PASSWORD \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out release/JACC-v1.0.0.apk \
            release/JACC-v1.0.0-aligned.apk
          "$APKSIGNER" verify --verbose --print-certs release/JACC-v1.0.0.apk
          rm -f release/JACC-v1.0.0-aligned.apk jacc-release-key.jks
      - name: Prepare release files
        run: |
          cp build/app/outputs/bundle/release/app-release.aab release/JACC-v1.0.0.aab
          sha256sum release/JACC-v1.0.0.apk release/JACC-v1.0.0.aab > release/JACC-v1.0.0-sha256.txt
          cat > release/JACC-v1.0.0-release-notes.txt <<'TXT'
          JACC 1.0.0
          - Approved JACC logo and splash screen
          - Secure token auto-login
          - Logout clears saved session
          - Device binding support
          - Expired-member handling
          - Offline retry and update checks
          TXT
          cd release && zip JACC-v1.0.0-release.zip JACC-v1.0.0.apk JACC-v1.0.0.aab JACC-v1.0.0-sha256.txt JACC-v1.0.0-release-notes.txt
      - uses: actions/upload-artifact@v4
        with:
          name: JACC-v1.0.0-release
          path: flutter_app/release/*
          retention-days: 90
