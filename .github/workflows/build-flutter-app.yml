name: Build JACC Flutter App

on:
  push:
    branches: [main, agent/jacc-flutter-clean]
    paths:
      - 'flutter_app/**'
      - '.github/workflows/build-flutter-app.yml'
  pull_request:
    branches: [main]
    paths:
      - 'flutter_app/**'
      - '.github/workflows/build-flutter-app.yml'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Generate Android project
        run: flutter create . --platforms=android --org=com.jacc.app
      - name: Add internet permission
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p=Path('android/app/src/main/AndroidManifest.xml')
          s=p.read_text()
          permission='<uses-permission android:name="android.permission.INTERNET" />'
          if permission not in s:
              s=s.replace('<manifest xmlns:android="http://schemas.android.com/apk/res/android">','<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    '+permission)
          p.write_text(s)
          PY
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter build apk --release
      - run: flutter build appbundle --release
      - uses: actions/upload-artifact@v4
        with:
          name: JACC-Flutter-Android
          path: |
            flutter_app/build/app/outputs/flutter-apk/app-release.apk
            flutter_app/build/app/outputs/bundle/release/app-release.aab
          retention-days: 90
