name: Build JACC Flutter App

on:
  push:
    branches: [main, agent/jacc-flutter-app]
    paths:
      - 'flutter_app/**'
      - '.github/workflows/build-flutter-app.yml'
  pull_request:
    branches: [main]
    paths:
      - 'flutter_app/**'
      - '.github/workflows/build-flutter-app.yml'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate Android project files
        run: flutter create . --platforms=android --org=com.jacc.app

      - name: Add Android internet permission
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('android/app/src/main/AndroidManifest.xml')
          text = path.read_text()
          permission = '<uses-permission android:name="android.permission.INTERNET" />'
          if permission not in text:
              text = text.replace('<manifest xmlns:android="http://schemas.android.com/apk/res/android">', '<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    ' + permission)
          path.write_text(text)
          PY

      - name: Install packages
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Build release App Bundle
        run: flutter build appbundle --release

      - name: Upload Android builds
        uses: actions/upload-artifact@v4
        with:
          name: JACC-Flutter-Android
          path: |
            flutter_app/build/app/outputs/flutter-apk/app-release.apk
            flutter_app/build/app/outputs/bundle/release/app-release.aab
          retention-days: 90
